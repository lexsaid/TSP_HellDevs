<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Trabajo - MIZCUIN</title>
    <link rel="stylesheet" href="../css/estilo_global.css">
    <link rel="stylesheet" href="../css/estilo_verTrabajo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="app-container">
    <header class="header-detalle">
        <a href="trabajos_aceptados.html" class="back-link">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1 class="titulo-app">MIZCUIN</h1>
    </header>

    <div class="carousel-container">
        <div class="carousel-track" id="carouselTrack">
            <!-- Las imágenes se inyectarán aquí -->
        </div>
        <button class="carousel-btn prev-btn" id="btnPrevImg" style="display:none;"><i class="fas fa-chevron-left"></i></button>
        <button class="carousel-btn next-btn" id="btnNextImg" style="display:none;"><i class="fas fa-chevron-right"></i></button>
    </div>

    <div class="info-container">
        <div class="info-box title-box" id="jobTitle">Cargando...</div>
        
        <div class="info-box desc-box" id="jobDesc">
            Obteniendo detalles...
        </div>

        <div class="info-box location-box">
            <span id="jobLocation">Ubicación: Cargando...</span>
            <i class="fas fa-map-marker-alt icon-map"></i>
        </div>

        <div class="row-info">
            <div class="info-box half" id="jobPrice">Pago: --</div>
            <div class="info-box half" id="jobDate">Publicado: --</div>
        </div>
    </div>

    <footer class="footer-acciones">
        <button class="btn-aceptar" onclick="window.location.href='trabajos_aceptados.html'" style="width: 100%;">Regresar</button>
    </footer>
</div>

<script src="../js/api.js"></script>
<script src="../js/verTrabajoAceptado.js"></script>

</body>
</html>
