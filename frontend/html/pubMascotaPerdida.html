<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reportar Mascota Perdida</title>
    <!-- Usar la fuente Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/estilo_mascPerdida.css">
</head>
<body>
    <div class="card">
        <a href="comunidad.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <h2><i class="fa-solid fa-paw"></i> Mascota Perdida</h2>

        <form id="postForm">
            <div class="form-group">
                <label for="nombre">Nombre de la Mascota</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej. Firulais" required>
            </div>

            <div class="form-group">
                <label for="tipo_animal">Tipo de Animal</label>
                <select id="tipo_animal" name="tipo_animal" required>
                    <option value="" disabled selected>Selecciona un tipo</option>
                    <option value="Perro">Perro</option>
                    <option value="Gato">Gato</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tamanio">Tamaño</label>
                <select id="tamanio" name="tamanio" required>
                    <option value="" disabled selected>Selecciona un tamaño</option>
                    <option value="Pequeño">Pequeño</option>
                    <option value="Mediano">Mediano</option>
                    <option value="Grande">Grande</option>
                </select>
            </div>

            <div class="form-group">
                <label for="color">Color principal</label>
                <input type="text" id="color" name="color" placeholder="Ej. Blanco con manchas negras" required>
            </div>

            <div class="form-group">
                <label for="edad">Edad aproximada (meses)</label>
                <input type="number" id="edad" name="edad" placeholder="Ej. 3" min="0" step="1" required>
            </div>

            <div class="form-group">
                <label for="direccion">Última vez visto en (Dirección)</label>
                <input type="text" id="direccion" name="direccion" placeholder="Ej. Parque Central, Av. Siempre Viva" required>
            </div>

            <div class="form-group">
                <label for="discapacidad">Discapacidad / Condición médica</label>
                <input type="text" id="discapacidad" name="discapacidad" placeholder="Ej. Ninguna, Cojea, Sordo" required>
            </div>

            <div class="form-group">
                <label for="detalles_adicionales">Detalles Adicionales</label>
                <textarea id="detalles_adicionales" name="detalles_adicionales" placeholder="Cualquier información extra que ayude a reconocerlo..." required></textarea>
            </div>

            <div class="form-group">
                <label for="recompensa">Recompensa (MXN)</label>
                <input type="number" id="recompensa" name="recompensa" placeholder="Ej. 1000 o 0" min="0" step="0.01" required>
            </div>

            <!-- Fotos -->
            <div class="form-group">
                <label>Fotos de la mascota</label>
                <input type="file" id="fotos" accept="image/*" multiple>
                <div class="image-preview" id="imagePreview"></div>
            </div>

            <button type="submit">Publicar Reporte</button>
        </form>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/masPerdida.js"></script>
</body>
</html>
