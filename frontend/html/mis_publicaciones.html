<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Publicaciones | MIZCUIN</title>
    <link rel="stylesheet" href="../css/estilo_misPublicaciones.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="app-container">
    <header class="main-header">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1 class="header-title">Mis Publicaciones</h1>
    </header>

    <div class="content">
        <div class="section-info">
            <p>Administra tus trabajos activos y el tiempo restante.</p>
        </div>

        <div id="wrapper">
            <div class="card" data-seconds="86400">
                <h3>🐱 Cuidado de Gato Persa</h3>
                <span class="status active">● Activo</span>
                <div class="timer-box">
                    <i class="far fa-clock"></i> Expira en: <span class="timer-display">24:00:00</span>
                </div>
                <div class="actions">
                    <button class="btn btn-details"><i class="fas fa-search"></i> Detalles</button>
                    <button class="btn btn-complete"><i class="fas fa-check"></i> Completar</button>
                    <button class="btn btn-deactivate"><i class="fas fa-trash"></i> Baja</button>
                    <button class="btn btn-extend"><i class="fas fa-plus"></i> Extender 24h</button>
                </div>
            </div>

            <div class="card" data-seconds="3540">
                <h3>🐕 Paseo Husky Siberiano</h3>
                <span class="status active">● Activo</span>
                <div class="timer-box">
                    <i class="far fa-clock"></i> Expira en: <span class="timer-display">00:59:00</span>
                </div>
                <div class="actions">
                    <button class="btn btn-details"><i class="fas fa-search"></i> Detalles</button>
                    <button class="btn btn-complete"><i class="fas fa-check"></i> Completar</button>
                    <button class="btn btn-deactivate"><i class="fas fa-trash"></i> Baja</button>
                    <button class="btn btn-extend"><i class="fas fa-plus"></i> Extender 24h</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../js/misPublicaciones.js"></script>
</body>
</html>
