<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicacion de trabajo</title>

    <link rel="stylesheet" href="../css/estilo_pubTra.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body>
<div class="card">

  <a href="servicios.html" class="back-btn">
    <i class="fas fa-arrow-left"></i>
  </a>

  <h2>🐾 Publicar trabajo</h2>
  <form id="postForm">
    <div class="form-group">
      <label>📌 Tipo</label>
      <select>
        <option>Paseo</option>
        <option>Cuidado</option>
        <option>Alimentación</option>
        <option>Limpieza</option>
      </select>
    </div>

    <div class="form-group">
      <label>📝 Descripción</label>
      <textarea placeholder="Detalles del trabajo, horarios, cuidados especiales..."></textarea>
    </div>

    <div class="form-group">
      <label>💰 Recompensa ($)</label>
      <input type="number" placeholder="Ej: 25000">
    </div>

    <div class="form-group">
      <label>📍 Ubicación</label>
      <input type="text" placeholder="Barrio, ciudad o zona">
    </div>

    <div class="form-group">
      <label >🖼️ Imágenes</label>
      <input type="file" id="imageUpload" multiple accept="image/*" required>
      <div class="image-preview" id="previewContainer"></div>
    </div>

    <button type="submit">Publicar ahora</button>
  </form>
</div>

<script src="../js/publicarTrabajo.js"></script>

</body>
</html>
