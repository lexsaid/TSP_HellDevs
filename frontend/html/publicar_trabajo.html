<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicacion de trabajo</title>

    <link rel="stylesheet" href="../css/estilo_global.css">
    <link rel="stylesheet" href="../css/estilo_pubTra.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body>
<div class="app-container">
<div class="card">

  <a href="servicios.html" class="back-btn">
    <i class="fas fa-arrow-left"></i>
  </a>

  <h2 id="pageTitle">🐾 Publicar trabajo</h2>
  <form id="postForm">
    <div class="form-group">
      <label>✒️ Título</label>
      <input type="text" id="tituloTrabajo" placeholder="Ej: Busco paseador de perro" required>
    </div>

    <div class="form-group">
      <label>📌 Tipo</label>
      <select id="tipoTrabajo">
        <option value="Paseo">Paseo</option>
        <option value="Cuidado">Cuidado</option>
        <option value="Alimentación">Alimentación</option>
        <option value="Limpieza">Limpieza</option>
      </select>
    </div>

    <div class="form-group">
      <label>📝 Descripción</label>
      <textarea id="descTrabajo" placeholder="Detalles del trabajo, horarios, cuidados especiales..."></textarea>
    </div>

    <div class="form-group">
      <label>💰 Recompensa ($)</label>
      <input type="number" id="montoTrabajo" placeholder="Ej: 25000">
    </div>

    <div class="form-group">
      <label>📍 Ubicación</label>
      <input type="text" id="ubicacionTrabajo" placeholder="Barrio, ciudad o zona">
    </div>

    <div class="form-group">
      <label >🖼️ Imágenes</label>
      <input type="file" id="imageUpload" multiple accept="image/*" required>
      <div class="image-preview" id="previewContainer"></div>
    </div>

    <button type="submit" id="submitBtn">Publicar ahora</button>
  </form>
</div>
</div>

<script src="../js/api.js"></script>
<script src="../js/publicarTrabajo.js"></script>

</body>
</html>
