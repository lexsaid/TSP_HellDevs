<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - MIZCUIN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../css/estilo_chat.css">
</head>

<body>

<div class="chat">
  
  <header>
    <a href="servicios.html" class="back-link">
      <i class="fas fa-arrow-left"></i>
    </a>
    [nombre del usuario] - Chat de Trabajo
  </header>

  <div class="messages" id="msgs">
    <div class="msg other">¡Hola! ¿Podrías enviarme las fotos del reporte?</div>
    <div class="msg me">Claro, dame un segundo.</div>
  </div>

  <div class="input-area">
    <button class="attachment-btn" onclick="document.getElementById('fileInput').click()" title="Adjuntar archivo">＋</button>
    <input type="file" id="fileInput" multiple>

    <input type="text" id="txt" placeholder="Escribe un mensaje aquí..." autocomplete="off">
    
    <button class="send-btn" id="sendBtn">➤</button>
  </div>
</div>

<script src="../js/chat.js"></script>

</body>
</html>
