<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajos Aceptados | MIZCUIN</title>
    <link rel="stylesheet" href="../css/estilo_traAceptados.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="app-container">
    <header class="main-header">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1 class="header-title">📌 Trabajos aceptados</h1>
    </header>

    <div class="content">
        <div id="wrapper">
            <div class="job-card">
                <div class="job-header">
                    <h3>🐕 Paseo de perro</h3>
                    <span class="badge pending">Pendiente</span>
                </div>
                <div class="job-info">
                    <span><i class="fas fa-map-marker-alt"></i> Centro, Zona 1</span>
                    <span><i class="fas fa-hand-holding-usd"></i> $18.000</span>
                    <span><i class="fas fa-clock"></i> 2:00 PM</span>
                </div>
                <div class="actions">
                    <button class="btn btn-primary btn-complete">✓ Completar</button>
                    <button class="btn btn-outline">💬 Contactar</button>
                </div>
            </div>

            <div class="job-card">
                <div class="job-header">
                    <h3>🐱 Cuidado de gato</h3>
                    <span class="badge done">Completado</span>
                </div>
                <div class="job-info">
                    <span><i class="fas fa-map-marker-alt"></i> Chapinero</span>
                    <span><i class="fas fa-hand-holding-usd"></i> $25.000</span>
                    <span><i class="fas fa-clock"></i> 9:00 AM - 6:00 PM</span>
                </div>
                <div class="actions">
                    <button class="btn btn-primary" disabled style="opacity:0.6;">✓ Completado</button>
                    <button class="btn btn-outline">📋 Ver resumen</button>
                </div>
            </div>

            <div class="job-card">
                <div class="job-header">
                    <h3>🦜 Alimentación aves</h3>
                    <span class="badge pending">Pendiente</span>
                </div>
                <div class="job-info">
                    <span><i class="fas fa-map-marker-alt"></i> Usaquén</span>
                    <span><i class="fas fa-hand-holding-usd"></i> $12.000</span>
                    <span><i class="fas fa-clock"></i> Mañana y tarde</span>
                </div>
                <div class="actions">
                    <button class="btn btn-primary btn-complete">✓ Completar</button>
                    <button class="btn btn-outline">💬 Contactar</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../js/trabajosAceptados.js"></script>
</body>
</html>
