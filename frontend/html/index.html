    <link rel="stylesheet" href="../css/estilo_global.css">
    <link rel="stylesheet" href="../css/estilo_inicio.css">

</head>

<body>

    <div id="menuOverlay" class="menu-overlay"></div>

    <div id="sideMenu" class="side-menu">
        <div class="menu-header-profile">
            <i class="fas fa-paw" style="color: #5e17eb;"></i>
            <span>Mi Cuenta</span>
        </div>
        <nav class="menu-items">
            <a href="mis_publicaciones.html"><i class="fas fa-paw"></i> Mis Trabajos</a>
            <a href="mis_albergues.html"><i class="fas fa-house"></i> Mis Albergues</a>
            <a href="mis_mascotas_perdidas.html"><i class="fas fa-magnifying-glass"></i> Mis Mascotas Perdidas</a>
            <a href="mis_adopciones.html"><i class="fas fa-heart"></i> Mis Animales en Adopción</a>
            <a href="trabajos_aceptados.html"><i class="fas fa-cog"></i> Mis Trabajos Aceptados</a>
            <hr>
            <a href="login.html" id="btnLogout" class="logout-link">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </a>
        </nav>
    </div>

    <div class="app-container">
        <header class="main-header" style="display:flex; justify-content:space-between; align-items:center;">
            <div style="display:flex; align-items:center;">
                <div class="menu-icon" id="openMenu" style="margin-right:15px;">
                    <i class="fas fa-bars"></i>
                </div>
                <h1 class="app-title" style="margin:0;">MIZCUIN</h1>
            </div>
            <div class="mailbox-icon" id="openMailbox" style="cursor:pointer; font-size:1.5rem; color:white;">
                <i class="fas fa-envelope"></i>
            </div>
        </header>

        <!-- Chat List Drawer -->
        <div id="mailboxDrawer" class="mailbox-drawer"
            style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:2000; overflow-y:auto; flex-direction:column;">
            <div class="mailbox-header"
                style="background: linear-gradient(95deg, #5e17eb, #7c3aed); color:white; padding:18px 20px; display:flex; align-items:center; box-shadow: 0 4px 15px rgba(94, 23, 235, 0.2);">
                <i class="fas fa-arrow-left" id="closeMailbox"
                    style="cursor:pointer; font-size:1.4rem; margin-right:15px;"></i>
                <h2 style="margin:0; font-size:1.2rem; font-weight:700;">Chats</h2>
            </div>
            <div id="chatsContainer" style="padding:10px;">
                <!-- Chats se inyectarán aquí -->
                <p style="text-align:center; color:#64748b; margin-top:20px;">Cargando chats...</p>
            </div>
        </div>

        <nav class="sub-nav">

            <a href="comunidad.html" class="nav-item">Comunidad</a>
        </nav>

        <main class="welcome-screen">
            <div class="icon-container">
                <i class="fas fa-paw"></i>
            </div>
            <h2 class="welcome-text">Bienvenido</h2>
        </main>

    <script src="../js/api.js"></script>
    <script src="../js/inicio.js"></script>
