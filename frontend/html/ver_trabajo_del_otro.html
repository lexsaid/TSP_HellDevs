<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Trabajo - MIZCUIN</title>
    <link rel="stylesheet" href="../css/estilo_verTrabajo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="card-detalle">
    <header class="header-detalle">
        <a href="servicios.html" class="back-link">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1 class="titulo-app">MIZCUIN</h1>
    </header>

    <div class="imagen-container">
        <img src="../img/basura_ejemplo.jpg" alt="Imagen del trabajo" class="img-trabajo">
    </div>

    <div class="info-container">
        <div class="info-box title-box">Limpieza</div>
        
        <div class="info-box desc-box">
            Unos perros esparcieron la basura y necesito que alguien la recoja.
        </div>

        <div class="info-box location-box">
            <span>Ubicación: Por ahi 201</span>
            <i class="fas fa-map-marker-alt icon-map"></i>
        </div>

        <div class="row-info">
            <div class="info-box half">Pago: 200 $</div>
            <div class="info-box half">Fin del Trabajo (01/03/2026)</div>
        </div>

        <div class="info-box timer-box">
            Expira en: <span id="timer">HH:MM:SS</span>
        </div>
    </div>

    <footer class="footer-acciones">
        <button class="btn-aceptar">Aceptar</button>
        <button class="btn-contactar">Contactar</button>
    </footer>
</div>

</body>
</html>
