server {
    listen 80;
    server_name localhost;

    # Carpeta raíz para los archivos HTML
    root /usr/share/nginx/html/html;
    index login.html;

    location / {
        try_files $uri $uri/ $uri.html /login.html =404;
    }

    # Configuración para HTML (Sin caché)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # BLOQUE ÚNICO PARA CSS
    # Fusionamos la ruta personalizada con la desactivación de caché
    location /css/ {
        root /usr/share/nginx/html; # Busca en /usr/share/nginx/html/css/
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # BLOQUE ÚNICO PARA JS
    location /js/ {
        root /usr/share/nginx/html; # Busca en /usr/share/nginx/html/js/
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
}