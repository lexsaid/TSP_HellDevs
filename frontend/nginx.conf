server {
    listen 80;
    server_name localhost;

    # 1. Cambiamos la raíz para entrar directamente a la carpeta de tus HTML
    # Esto hace que 'mizcuin.online/' apunte internamente a '/usr/share/nginx/html/html/'
    root /usr/share/nginx/html/html;

    # 2. Ahora el índice es simplemente el nombre del archivo
    index login.html;

    location / {
        # 3. Simplificamos el try_files
        # Intenta: el archivo exacto ($uri), luego como carpeta ($uri/), 
        # luego agrega .html automáticamente ($uri.html), y si no, vuelve al login.
        try_files $uri $uri/ $uri.html /login.html =404;
    }

    # Mantenemos tu configuración de no-caché para archivos HTML
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # IMPORTANTE: Si tus carpetas de /css y /js están FUERA de la carpeta /html,
    # necesitamos crear rutas específicas para que Nginx las siga encontrando.
    location /css/ {
        root /usr/share/nginx/html;
    }

    location /js/ {
        root /usr/share/nginx/html;
    }
}