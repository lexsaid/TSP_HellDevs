<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetSanity - Servicios</title>
    
    <link rel="stylesheet" href="../css/estilo_servicios.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="mobile-container">
        <header class="main-header">
            <a href="inicio.html" class="back-icon">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="page-title">Servicios</h1>
            <div class="add-icon">
                <i class="fas fa-plus"></i>
            </div>
        </header>

        <section class="filter-section">
            <span class="filter-text">Trabajos</span>
            <i class="fas fa-chevron-down dropdown-icon"></i>
        </section>

        <main class="content-list">
            <div class="empty-state">
                <i class="fas fa-paw"></i>
                <p>No hay servicios disponibles por el momento.</p>
                <span>¡Vuelve más tarde o publica uno nuevo!</span>
            </div>
        </main>
    </div>

</body>
</html>
