<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Pro | MIZCUIN</title>
<style>
  /* ========== RESET Y ESTILOS GLOBALES ========== */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #f1f5f9;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* ========== CONTENEDOR MÁS GRANDE ========== */
  .chat {
    width: 100%;
    max-width: 800px; /* Aumentado de 420px a 800px */
    height: 85vh;     /* Altura fija para que se vea imponente */
    background: white;
    border-radius: 24px;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: white;
    padding: 20px 30px;
    font-weight: 700;
    font-size: 1.4rem;
    border-bottom: 3px solid #5e17eb;
    color: #0f172a;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .messages {
    flex: 1;
    padding: 25px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
    background: #fdfdfd;
  }

  .msg {
    max-width: 70%;
    padding: 12px 18px;
    border-radius: 18px;
    font-size: 1rem;
    line-height: 1.5;
    position: relative;
    animation: fadeSlideUp 0.3s ease;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .me {
    background: #22c55e;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .other {
    background: #f1f5f9;
    color: #1e293b;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  /* Burbuja de archivo adjunto */
  .msg-file {
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    color: #1e40af;
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
  }

  /* ========== ÁREA DE ENVÍO MEJORADA ========== */
  .input-area {
    background: white;
    padding: 20px 30px;
    border-top: 1px solid #e2e8f0;
    display: flex;
    gap: 15px;
    align-items: center;
  }

  /* Botón de Adjuntos (+) */
  .attachment-btn {
    background: #f1f5f9;
    color: #64748b;
    border: none;
    width: 45px;
    height: 45px;
    border-radius: 12px;
    font-size: 2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .attachment-btn:hover {
    background: #e2e8f0;
    color: #0f172a;
  }

  .input-area input {
    flex: 1;
    background: #f8fafc;
    border: 2px solid #f1f5f9;
    border-radius: 15px;
    padding: 14px 20px;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-area input:focus {
    border-color: #5e17eb;
  }

  .send-btn {
    background: #5e17eb;
    border: none;
    width: 50px;
    height: 50px;
    border-radius: 15px;
    color: white;
    font-size: 2rem;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
  }

  .send-btn:hover { background: #4c11c9; transform: scale(1.05); }

  /* Input de archivo oculto */
  #fileInput { display: none; }
</style>
</head>
<body>

<div class="chat">
  <header>🐾 Chat de Trabajo - MIZCUIN</header>

  <div class="messages" id="msgs">
    <div class="msg other">¡Hola! ¿Podrías enviarme las fotos del reporte?</div>
    <div class="msg me">Claro, dame un segundo.</div>
  </div>

  <div class="input-area">
    <button class="attachment-btn" onclick="document.getElementById('fileInput').click()" title="Adjuntar archivo">＋</button>
    <input type="file" id="fileInput" multiple>

    <input type="text" id="txt" placeholder="Escribe un mensaje aquí..." autocomplete="off">
    
    <button class="send-btn" id="sendBtn">➤</button>
  </div>
</div>

<script>
  const msgsContainer = document.getElementById('msgs');
  const inputField = document.getElementById('txt');
  const sendButton = document.getElementById('sendBtn');
  const fileInput = document.getElementById('fileInput');

  function addMessage(text, type = 'me', isFile = false) {
    const messageDiv = document.createElement('div');
    messageDiv.className = `msg ${type} ${isFile ? 'msg-file' : ''}`;
    
    if (isFile) {
      messageDiv.innerHTML = `📄 <span>${text}</span>`;
    } else {
      messageDiv.textContent = text;
    }

    msgsContainer.appendChild(messageDiv);
    msgsContainer.scrollTop = msgsContainer.scrollHeight;
  }

  function sendMessage() {
    let text = inputField.value.trim();
    if (text === "") return;
    addMessage(text, 'me');
    inputField.value = "";
  }

  // Manejar subida de archivos
  fileInput.addEventListener('change', (e) => {
    const files = e.target.files;
    for (let i = 0; i < files.length; i++) {
      addMessage(files[i].name, 'me', true);
    }
    // Limpiar el input para permitir subir el mismo archivo después
    fileInput.value = ""; 
  });

  sendButton.addEventListener('click', sendMessage);
  inputField.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
</script>

</body>
</html>
