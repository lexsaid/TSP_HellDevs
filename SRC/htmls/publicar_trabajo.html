<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publicar Trabajo | MIZCUIN</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: linear-gradient(145deg, #eef2ff 0%, #f9fafc 100%);
    font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px 16px;
  }

  .card {
    max-width: 540px;
    width: 100%;
    background: white;
    border-radius: 36px;
    padding: 32px 28px;
    box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2);
    transition: all 0.3s;
    animation: fadeUp 0.5s ease;
  }

  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  h2 {
    font-size: 1.9rem;
    font-weight: 800;
    background: linear-gradient(135deg, #5e17eb, #8b5cf6);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    font-weight: 600;
    font-size: 0.85rem;
    display: block;
    margin-bottom: 6px;
    color: #1e293b;
    letter-spacing: -0.2px;
  }

  input, select, textarea {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid #e2e8f0;
    border-radius: 20px;
    font-size: 0.9rem;
    font-family: inherit;
    transition: all 0.2s;
    background: #fefefe;
    outline: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: #5e17eb;
    box-shadow: 0 0 0 3px rgba(94, 23, 235, 0.2);
  }

  textarea {
    resize: vertical;
    min-height: 90px;
  }

  .file-input {
    padding: 10px 0;
  }
  .file-input input {
    padding: 12px;
    background: #f1f5f9;
  }

  .image-preview {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  .preview-img {
    width: 70px;
    height: 70px;
    object-fit: cover;
    border-radius: 16px;
    border: 2px solid #e2e8f0;
  }

  button {
    width: 100%;
    padding: 16px;
    background: linear-gradient(95deg, #5e17eb, #7c3aed);
    border: none;
    border-radius: 40px;
    color: white;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.25s;
    margin-top: 12px;
    box-shadow: 0 8px 18px rgba(94, 23, 235, 0.25);
  }

  button:hover {
    transform: scale(1.02);
    background: linear-gradient(95deg, #6d28d9, #8b5cf6);
    box-shadow: 0 12px 22px rgba(94, 23, 235, 0.3);
  }
  button:active {
    transform: scale(0.98);
  }

  hr {
    margin: 18px 0;
    border: none;
    height: 1px;
    background: linear-gradient(to right, #e2e8f0, transparent);
  }
</style>
</head>
<body>
<div class="card">
  <h2>🐾 Publicar trabajo</h2>
  <form id="postForm">
    <div class="form-group">
      <label>📌 Tipo</label>
      <select>
        <option>Paseo</option>
        <option>Cuidado</option>
        <option>Alimentación</option>
        <option>Entrenamiento</option>
      </select>
    </div>

    <div class="form-group">
      <label>📝 Descripción</label>
      <textarea placeholder="Detalles del trabajo, horarios, cuidados especiales..."></textarea>
    </div>

    <div class="form-group">
      <label>💰 Recompensa ($)</label>
      <input type="number" placeholder="Ej: 25000">
    </div>

    <div class="form-group">
      <label>📍 Ubicación</label>
      <input type="text" placeholder="Barrio, ciudad o zona">
    </div>

    <div class="form-group">
      <label>🖼️ Imágenes (opcional)</label>
      <input type="file" id="imageUpload" multiple accept="image/*">
      <div class="image-preview" id="previewContainer"></div>
    </div>

    <button type="submit">✨ Publicar ahora</button>
  </form>
</div>

<script>
  const imageInput = document.getElementById('imageUpload');
  const previewContainer = document.getElementById('previewContainer');

  imageInput.addEventListener('change', function() {
    previewContainer.innerHTML = '';
    Array.from(this.files).forEach(file => {
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.createElement('img');
          img.src = e.target.result;
          img.className = 'preview-img';
          previewContainer.appendChild(img);
        };
        reader.readAsDataURL(file);
      }
    });
  });

  document.getElementById('postForm').addEventListener('submit', (e) => {
    e.preventDefault();
    alert('✅ Trabajo publicado con éxito');
    // Aquí iría lógica de envío a backend
  });
</script>
</body>
</html>
