<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Publicaciones | MIZCUIN</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #f8fafc;
    font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .container {
    max-width: 520px;
    width: 100%;
    margin: 0 auto;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-left: 5px solid #5e17eb;
    padding-left: 18px;
  }

  .card {
    background: white;
    border-radius: 24px;
    padding: 20px 24px;
    margin-bottom: 20px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.05);
    transition: all 0.25s ease;
    border: 1px solid #eef2ff;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 20px 35px -10px rgba(94, 23, 235, 0.15);
    border-color: #cbd5e1;
  }

  .card h3 {
    font-size: 1.35rem;
    font-weight: 700;
    color: #1e293b;
    margin-bottom: 8px;
  }

  .status {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 40px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    background: #e2e8f0;
    color: #334155;
    margin-bottom: 18px;
  }

  .status.active {
    background: #dcfce7;
    color: #15803d;
  }

  .status.inactive {
    background: #fee2e2;
    color: #b91c1c;
  }

  .actions {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }

  button {
    border: none;
    padding: 10px 20px;
    border-radius: 40px;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn-complete {
    background: #22c55e;
    color: white;
    box-shadow: 0 2px 6px rgba(34,197,94,0.2);
  }
  .btn-complete:hover {
    background: #16a34a;
    transform: scale(1.02);
  }

  .btn-deactivate {
    background: #ef4444;
    color: white;
    box-shadow: 0 2px 6px rgba(239,68,68,0.2);
  }
  .btn-deactivate:hover {
    background: #dc2626;
    transform: scale(1.02);
  }

  button:active {
    transform: scale(0.97);
  }

  @keyframes fadeSlide {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .card {
    animation: fadeSlide 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
  }
</style>
</head>
<body>
<div class="container">
  <h1>📋 Mis publicaciones</h1>
  
  <div class="card">
    <h3>🐱 Cuidado de gato</h3>
    <span class="status active">● Activo</span>
    <div class="actions">
      <button class="btn-complete">✓ Completar</button>
      <button class="btn-deactivate">⏸ Desactivar</button>
    </div>
  </div>

  <div class="card">
    <h3>🐕 Paseo matutino</h3>
    <span class="status inactive">○ Inactivo</span>
    <div class="actions">
      <button class="btn-complete">✓ Completar</button>
      <button class="btn-deactivate">⏸ Desactivar</button>
    </div>
  </div>

  <div class="card">
    <h3>🦜 Alimentación exótica</h3>
    <span class="status active">● Activo</span>
    <div class="actions">
      <button class="btn-complete">✓ Completar</button>
      <button class="btn-deactivate">⏸ Desactivar</button>
    </div>
  </div>
</div>

<script>
  // Pequeño interactivo para demostración (cambia estado visual)
  document.querySelectorAll('.btn-complete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const card = btn.closest('.card');
      const statusSpan = card.querySelector('.status');
      statusSpan.textContent = '✓ Completado';
      statusSpan.className = 'status inactive';
      alert('Publicación marcada como completada');
    });
  });

  document.querySelectorAll('.btn-deactivate').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const card = btn.closest('.card');
      const statusSpan = card.querySelector('.status');
      if(statusSpan.textContent.includes('Activo')) {
        statusSpan.textContent = '○ Inactivo';
        statusSpan.className = 'status inactive';
      } else {
        statusSpan.textContent = '● Activo';
        statusSpan.className = 'status active';
      }
    });
  });
</script>
</body>
</html>
